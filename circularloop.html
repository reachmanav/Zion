<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>∞ — The Matrix</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #c9d1d9; font-family: 'Share Tech Mono', monospace; overflow-x: hidden; min-height: 100vh; }

    #binary-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .page { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 3rem; }

    .tagline {
      font-family: 'Orbitron', monospace; font-size: clamp(1rem, 3vw, 1.5rem);
      color: #00ff41; letter-spacing: 6px; text-shadow: 0 0 20px rgba(0,255,65,0.3);
      margin-top: 1.5rem; text-align: center;
    }
    .subtitle { font-size: 0.7rem; color: #8b949e; letter-spacing: 3px; margin: 0.3rem 0 1.5rem; text-align: center; }

    .loop-container { position: relative; width: min(95vw, 1100px); height: min(70vw, 580px); }
    .loop-svg { width: 100%; height: 100%; }

    @keyframes dash-flow { to { stroke-dashoffset: -40; } }
    @keyframes pulse-soft { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .anim-dash { animation: dash-flow 3s linear infinite; }
    .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }

    .n-icon { font-size: 1.2rem; }
    .n-year { font-family: 'Orbitron', monospace; font-size: 9px; fill: #ffd740; letter-spacing: 1px; }
    .n-title { font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 2px; }
    .n-desc { font-family: 'Share Tech Mono', monospace; font-size: 7px; fill: #8b949e; }

    .end-text {
      margin-top: 1.5rem; text-align: center; font-size: 0.7rem;
      color: #8b949e; line-height: 2; letter-spacing: 1px;
    }
    .end-text .chain { color: #ffd740; font-size: 0.85rem; margin-top: 0.5rem; letter-spacing: 2px; }
    .end-text a { color: #00ff41; text-decoration: none; border-bottom: 1px solid rgba(0,255,65,0.2); }
    .end-text a:hover { border-color: #00ff41; }

    @media (max-width: 700px) {
      .loop-container { height: min(130vw, 700px); }
    }
  </style>
</head>
<body>

<canvas id="binary-bg"></canvas>

<div class="page">
  <div class="tagline">THE MATRIX IS A LOOP</div>
  <div class="subtitle">random · unfortunate events · push to try</div>

  <div class="loop-container">
    <svg class="loop-svg" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00ff41" opacity="0.5"/></marker>
        <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- ═══════════════════════════════════════════════════
           THE INFINITY PATH — figure-8 loop
           Left center: 300,280   Right center: 800,280
           Both radius ~220 vertical, ~250 horizontal
           ═══════════════════════════════════════════════════ -->

      <!-- Left loop path (clockwise: top → right-center → bottom → left → top) -->
      <path d="M300,60 C470,60 550,180 550,280 C550,380 470,500 300,500 C130,500 50,380 50,280 C50,180 130,60 300,60"
        fill="none" stroke="#00ff41" stroke-width="2" stroke-dasharray="14,8" class="anim-dash" opacity="0.25"/>

      <!-- Right loop path (clockwise: top → right → bottom → left-center → top) -->
      <path d="M800,60 C970,60 1050,180 1050,280 C1050,380 970,500 800,500 C630,500 550,380 550,280 C550,180 630,60 800,60"
        fill="none" stroke="#00ff41" stroke-width="2" stroke-dasharray="14,8" class="anim-dash" opacity="0.25" style="animation-delay:-1.5s"/>

      <!-- Faint inner glow on both loops -->
      <path d="M300,60 C470,60 550,180 550,280 C550,380 470,500 300,500 C130,500 50,380 50,280 C50,180 130,60 300,60"
        fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.08"/>
      <path d="M800,60 C970,60 1050,180 1050,280 C1050,380 970,500 800,500 C630,500 550,380 550,280 C550,180 630,60 800,60"
        fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.08"/>

      <!-- Center crossover point -->
      <circle cx="550" cy="280" r="6" fill="#00ff41" opacity="0.3" class="anim-pulse"/>
      <circle cx="550" cy="280" r="2" fill="#00ff41" opacity="0.8"/>

      <!-- ═══════════════════════════
           LEFT LOOP — THE PAST
           Top: 2006
           Right-Center: 2010 (Gift)
           Bottom: Matrix Movie
           ═══════════════════════════ -->

      <!-- LEFT LABEL -->
      <text x="300" y="280" font-family="'Orbitron', monospace" font-size="10" fill="#00ff41" text-anchor="middle" opacity="0.1" letter-spacing="4">ORIGIN</text>

      <!-- ══ NODE: 2006 — LOBO + ZION (top of left loop) ══ -->
      <g transform="translate(300, 55)">
        <rect x="-75" y="-45" width="150" height="90" rx="12" fill="#000" stroke="#ffd740" stroke-width="1.5" opacity="0.9"/>
        <!-- Two icons side by side -->
        <text x="-28" y="-14" font-size="24">🐺</text>
        <text x="12" y="-14" font-size="24">⬡</text>
        <text x="0" y="8" text-anchor="middle" class="n-year">2006</text>
        <text x="0" y="20" text-anchor="middle" class="n-title" fill="#ffd740">SOFTWARE ENGINEERED</text>
        <text x="0" y="32" text-anchor="middle" class="n-desc" fill="#ffd740" opacity="0.6">they don't know it yet</text>
      </g>

      <!-- ══ NODE: 2010 — THE GIFT / PLUG (right side of left loop, near center) ══ -->
      <g transform="translate(460, 280)">
        <rect x="-65" y="-50" width="130" height="100" rx="12" fill="#000" stroke="#c084fc" stroke-width="1.5" opacity="0.9"/>
        <!-- Three icons: chocolate + gift + plug -->
        <text x="-35" y="-18" font-size="18">🍫</text>
        <text x="-5" y="-18" font-size="18">🎁</text>
        <text x="25" y="-18" font-size="18">🔌</text>
        <text x="0" y="2" text-anchor="middle" class="n-year">2010 · APR 19</text>
        <text x="0" y="14" text-anchor="middle" class="n-title" fill="#c084fc">THE GIFT</text>
        <text x="0" y="26" text-anchor="middle" class="n-desc">$0 or $1 · just be friends</text>
        <text x="0" y="38" text-anchor="middle" class="n-desc" fill="#c084fc" opacity="0.5">3:15 AM · a birthday</text>
      </g>

      <!-- ══ NODE: MATRIX MOVIE (bottom of left loop) ══ -->
      <g transform="translate(300, 500)">
        <rect x="-75" y="-40" width="150" height="80" rx="12" fill="#000" stroke="#00ff41" stroke-width="1.5" opacity="0.9"/>
        <text x="0" y="-14" text-anchor="middle" font-size="22">🎬</text>
        <text x="0" y="4" text-anchor="middle" class="n-year">2000</text>
        <text x="0" y="16" text-anchor="middle" class="n-title" fill="#00ff41">MATRIX MOVIE</text>
        <text x="0" y="28" text-anchor="middle" class="n-desc">decide: software engineer</text>
      </g>


      <!-- ═══════════════════════════
           RIGHT LOOP — THE BUILD
           Top: (Zion — built)
           Right: (loops back)
           Bottom: (Lobo — gave back)
           Left-Center: crosses to 2010
           ═══════════════════════════ -->

      <!-- RIGHT LABEL -->
      <text x="800" y="280" font-family="'Orbitron', monospace" font-size="10" fill="#00ff41" text-anchor="middle" opacity="0.1" letter-spacing="4">BUILD</text>

      <!-- ══ NODE: CRASH (left side of right loop, near center) ══ -->
      <g transform="translate(640, 280)">
        <rect x="-65" y="-50" width="130" height="100" rx="12" fill="#000" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
        <text x="0" y="-20" text-anchor="middle" font-size="22">⚡</text>
        <text x="0" y="-2" text-anchor="middle" class="n-year">2019 · APR 19</text>
        <text x="0" y="10" text-anchor="middle" class="n-title" fill="#ff6b6b">SYSTEM CRASH</text>
        <text x="0" y="22" text-anchor="middle" class="n-desc" fill="#ff6b6b" opacity="0.7">not the spoon that bends</text>
        <text x="0" y="34" text-anchor="middle" class="n-desc">relearn A, B, C, D...</text>
      </g>

      <!-- ══ NODE: RECOVERY (bottom of right loop) ══ -->
      <g transform="translate(800, 500)">
        <rect x="-75" y="-40" width="150" height="80" rx="12" fill="#000" stroke="#ffd740" stroke-width="1.5" opacity="0.9"/>
        <text x="0" y="-14" text-anchor="middle" font-size="22">🤝</text>
        <text x="0" y="4" text-anchor="middle" class="n-year">RECOVERY</text>
        <text x="0" y="16" text-anchor="middle" class="n-title" fill="#ffd740">THE FRIEND</text>
        <text x="0" y="28" text-anchor="middle" class="n-desc">CTO now · builds a website</text>
      </g>

      <!-- ══ NODE: LOBO (right side of right loop) ══ -->
      <g transform="translate(1000, 280)">
        <rect x="-58" y="-45" width="116" height="90" rx="12" fill="#000" stroke="#ffd740" stroke-width="2" opacity="0.9" filter="url(#gl)"/>
        <text x="0" y="-14" text-anchor="middle" font-size="26">🐺</text>
        <text x="0" y="6" text-anchor="middle" class="n-year">GAVE BACK</text>
        <text x="0" y="18" text-anchor="middle" class="n-title" fill="#ffd740">LOBO</text>
        <text x="0" y="30" text-anchor="middle" class="n-desc">"learn from this"</text>
      </g>

      <!-- ══ NODE: ZION (top of right loop) ══ -->
      <g transform="translate(800, 55)">
        <rect x="-70" y="-45" width="140" height="90" rx="12" fill="#000" stroke="#00ff41" stroke-width="2" opacity="0.9" filter="url(#gl)"/>
        <text x="0" y="-14" text-anchor="middle" font-size="26">⬡</text>
        <text x="0" y="6" text-anchor="middle" class="n-year">BUILT</text>
        <text x="0" y="18" text-anchor="middle" class="n-title" fill="#00ff41">ZION</text>
        <text x="0" y="30" text-anchor="middle" class="n-desc">6 agents · 14 constructs · $0</text>
      </g>

      <!-- ═══════════════════════════
           CONNECTION: ZION (top-right) → 2006 (top-left)
           The loop closes! Right side goes back to left side.
           ═══════════════════════════ -->
      <path d="M730,55 Q550,20 375,55" fill="none" stroke="#ffd740" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.35" marker-end="url(#ag)"/>
      <text x="550" y="18" font-family="'Orbitron', monospace" font-size="7" fill="#ffd740" text-anchor="middle" opacity="0.5" letter-spacing="2">SAME TWO PEOPLE</text>

      <!-- ═══════════════════════════
           CONNECTION: MATRIX MOVIE (bottom-left) → CRASH (right)
           ═══════════════════════════ -->
      <path d="M375,500 Q550,540 725,500" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,6" opacity="0.2"/>
      <text x="550" y="538" font-family="'Share Tech Mono', monospace" font-size="7" fill="#8b949e" text-anchor="middle" opacity="0.3">same date · different meaning</text>

      <!-- Center ∞ watermark -->
      <text x="550" y="295" font-family="'Orbitron', monospace" font-size="40" fill="#00ff41" text-anchor="middle" opacity="0.04" filter="url(#gl)">∞</text>

    </svg>
  </div>

  <div class="end-text">
    the friend who received a $0 gift in 2010<br>
    doesn't know this site exists.<br><br>
    this site <em style="color:#ffd740">is</em> the gift.<br>
    the loop closes where it started.<br>
    <div class="chain">🍫 → 🐺 → ⬡ → 🌐 → 🍫</div>
    <br>
    <a href="index.html">← back to the matrix</a>
  </div>
</div>

<script>
(function() {
  var c = document.getElementById('binary-bg');
  var ctx = c.getContext('2d');
  var w, h, cols, drops;

  function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
    cols = Math.floor(w / 18);
    drops = [];
    for (var i = 0; i < cols; i++) drops[i] = Math.random() * h / 18;
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
    ctx.fillRect(0, 0, w, h);
    ctx.font = '14px "Share Tech Mono", monospace';

    for (var i = 0; i < cols; i++) {
      var char = Math.random() > 0.5 ? '1' : '0';
      var x = i * 18;
      var y = drops[i] * 18;

      var brightness = Math.random();
      if (brightness > 0.97) ctx.fillStyle = 'rgba(0, 255, 65, 0.7)';
      else if (brightness > 0.92) ctx.fillStyle = 'rgba(0, 255, 65, 0.25)';
      else ctx.fillStyle = 'rgba(0, 255, 65, 0.04)';

      ctx.fillText(char, x, y);

      if (y > h && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
